site_name: 🦇 ConsolePi Build Guide
site_description: A tested recipe for building a Raspberry Pi console server on Raspberry Pi OS 13 (Trixie), with support for both traditional RJ45 and modern USB-C Cisco console ports.
site_url: https://batman4ny.github.io/consolepi-build-guide/
site_author: Billy Garcia
copyright: "© 2026 Billy Garcia (Batman4NY) — Apache-2.0. Based on <a href='https://github.com/Pack3tL0ss/ConsolePi'>ConsolePi</a> by Wade Wells."
repo_url: https://github.com/Batman4NY/consolepi-build-guide
repo_name: Batman4NY/consolepi-build-guide
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    # Dark mode by default (Batman would approve)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github
    logo: null

extra_css:
  - assets/custom.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Bill of Materials: bill-of-materials.md
  - Flash Raspberry Pi OS: flash-raspios.md
  - First Boot: first-boot.md
  - Install ConsolePi: install-consolepi.md
  - Verify Install: verify-install.md
  - Connect via USB-C: connect-cisco-usb-c.md
  - Connect via RJ45 (FTDI): connect-cisco-rj45.md
  - Access Methods: access-methods.md
  - Trixie Gotchas: trixie-gotchas.md
  - Troubleshooting: troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Batman4NY
      name: Batman4NY on GitHub
